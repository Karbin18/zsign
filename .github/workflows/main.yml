name: AutoSigner-Windows-Debug
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'ناوی بەرنامە'
        required: true
      ipa_url:
        description: 'لینکی IPA'
        required: true

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 1. Setup zSign
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev cmake g++ git
          git clone https://github.com/zhlynn/zsign.git
          cd zsign && mkdir build && cd build && cmake .. && make && sudo cp zsign /usr/local/bin/

      - name: 2. Check Files existence
        run: |
          echo "پشکنینی هەبوونی فایلەکان لە لاپەڕەی سەرەکی..."
          ls -l cert.p12 || (echo "❌ فایلی cert.p12 نادۆزرایەوە" && exit 1)
          ls -l prov.mobileprovision || (echo "❌ فایلی prov.mobileprovision نادۆزرایەوە" && exit 1)
          ls -l source.json || (echo "❌ فایلی source.json نادۆزرایەوە" && exit 1)

      - name: 3. Download IPA
        run: |
          curl -L "${{ github.event.inputs.ipa_url }}" -o app.ipa
          if [ ! -f app.ipa ]; then echo "❌ دابەزاندنی IPA شکستی هێنا"; exit 1; fi

      - name: 4. Final Sign Process
        run: |
          # تکایە لێرە لە جیاتی 1234 پاسۆردە ڕاستەقینەکەت بنووسە
          zsign -k cert.p12 -p AppleP12.com -m prov.mobileprovision -o signed.ipa app.ipa || (echo "❌ هەڵە لە کاتی ساین کردن (Error 100 یان هاوشێوەکانی)"; exit 1)

      - name: 5. Update Source & Push
        run: |
          IPA_LINK="https://raw.githubusercontent.com/${{ github.repository }}/main/signed.ipa"
          python3 -c "import json; f=open('source.json','r+'); d=json.load(f); d['${{ github.event.inputs.app_name }}']='$IPA_LINK'; f.seek(0); json.dump(d,f,indent=2); f.truncate()"
          
          git config --global user.name "SignerBot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Update ${{ github.event.inputs.app_name }}"
          git push
