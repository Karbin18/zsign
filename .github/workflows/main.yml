name: AutoSigner-Final-Fix
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'ناوی بەرنامە'
        required: true
      ipa_url:
        description: 'لینکی ڕاستەوخۆی IPA'
        required: true

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 1. Setup and Build zSign
        run: |
          # پاککردنەوەی فۆڵدەرە کۆنەکان بۆ ڕێگری لە هەڵەی File exists
          sudo rm -rf zsign build
          
          # دامەزراندنی پێداویستییەکان
          sudo apt-get update
          sudo apt-get install -y libssl-dev cmake g++ git
          
          # دابەزاندنی سۆرس و بونیادنانی بە شێوەیەکی پاک
          git clone --depth 1 https://github.com/zhlynn/zsign.git
          cd zsign
          mkdir -p build
          cd build
          cmake ..
          make -j$(nproc)
          sudo cp zsign /usr/local/bin/
          cd ../..

      - name: 2. Verify Files
        run: |
          ls -l cert.p12 || (echo "❌ cert.p12 نادۆزرایەوە" && exit 1)
          ls -l prov.mobileprovision || (echo "❌ prov.mobileprovision نادۆزرایەوە" && exit 1)

      - name: 3. Download IPA
        run: |
          curl -L "${{ github.event.inputs.ipa_url }}" -o app.ipa
          if [ ! -s app.ipa ]; then echo "❌ فایلی IPA بەتاڵە یان دانەبەزیوە"; exit 1; fi

      - name: 4. Sign the IPA
        run: |
          # لێرە پاسۆردە ڕاستەقینەکەت لە جیاتی 1234 بنووسە
          zsign -k cert.p12 -p AppleP12.com -m prov.mobileprovision -o signed.ipa app.ipa

      - name: 5. Update and Push
        run: |
          git config --global user.name "SignerBot"
          git config --global user.email "bot@github.com"
          
          IPA_LINK="https://raw.githubusercontent.com/${{ github.repository }}/main/signed.ipa"
          python3 -c "import json; f=open('source.json','r+'); d=json.load(f); d['${{ github.event.inputs.app_name }}']='$IPA_LINK'; f.seek(0); json.dump(d,f,indent=2); f.truncate()"
          
          git add .
          git commit -m "Update ${{ github.event.inputs.app_name }}"
          git push
