name: AutoSigner
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'ناوی بەرنامە'
        required: true
      ipa_url:
        description: 'لینکی IPA'
        required: true

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 1. Clean and Setup zSign
        run: |
          # پاککردنەوەی هەرچی فۆڵدەری کۆن هەیە بۆ ڕێگری لە 'File exists'
          sudo rm -rf zsign build
          
          sudo apt-get update
          sudo apt-get install -y libssl-dev cmake g++ git
          
          # دابەزاندنی وەشانێکی نوێ
          git clone --depth 1 https://github.com/zhlynn/zsign.git
          
          # پرۆسەی بونیادنان (Build) بە شێوەیەکی پارێزراو
          cd zsign
          mkdir -p build
          cd build
          cmake ..
          make -j$(nproc)
          sudo cp zsign /usr/local/bin/

      - name: 2. Check Essential Files
        run: |
          ls -l cert.p12 || (echo "❌ فایلی cert.p12 لە لاپەڕەی سەرەکی نییە" && exit 1)
          ls -l prov.mobileprovision || (echo "❌ فایلی prov.mobileprovision لە لاپەڕەی سەرەکی نییە" && exit 1)

      - name: 3. Download and Sign
        run: |
          curl -L "${{ github.event.inputs.ipa_url }}" -o app.ipa
          # ⚠️ تکایە لێرە لە جیاتی 1234 پاسۆردە ڕاستەقینەکەت بنووسە
          zsign -k cert.p12 -p AppleP12.com -m prov.mobileprovision -o signed.ipa app.ipa

      - name: 4. Update and Push
        run: |
          git config --global user.name "SignerBot"
          git config --global user.email "bot@github.com"
          
          # نوێکردنەوەی فایلی JSON
          IPA_LINK="https://raw.githubusercontent.com/${{ github.repository }}/main/signed.ipa"
          python3 -c "import json; f=open('source.json','r+'); d=json.load(f); d['${{ github.event.inputs.app_name }}']='$IPA_LINK'; f.seek(0); json.dump(d,f,indent=2); f.truncate()"
          
          git add .
          git commit -m "Update ${{ github.event.inputs.app_name }}"
          git push
