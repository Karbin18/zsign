name: DebugSigner
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'ناوی بەرنامە'
        required: true
      ipa_url:
        description: 'لینکی IPA'
        required: true

jobs:
  debug-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup zSign
        run: |
          sudo apt-get update
          sudo apt-get install -y libcommoncrypto-dev cmake
          git clone https://github.com/zhlynn/zsign.git
          cd zsign && mkdir build && cd build && cmake .. && make && sudo cp zsign /usr/local/bin/

      - name: Check P12 File
        run: |
          ls -l cert.p12
          file cert.p12
          # ئەمە نیشانی دەدات ئایا فایلەکە بەڕاستی P12 یە یان تەنها تێکستە

      - name: Test Password (Manual)
        run: |
          # تکایە لە جیاتی 1234، پاسۆردی ڕاستەقینەی شەهادەکەت بنووسە
          echo "تاقیکردنەوەی پاسۆرد بە دەست..."
          zsign -k cert.p12 -p 1234 -m prov.mobileprovision -v
          # ئەگەر لێرەدا Error 100 بدات، واتە فایلەکە یان پاسۆردەکە ۱۰۰٪ هەڵەیە

      - name: Download and Sign (Final Try)
        run: |
          curl -L "${{ github.event.inputs.ipa_url }}" -o app.ipa
          # لێرە پاسۆردە دەستییەکە بنووسە لە جیاتی 1234
          zsign -k cert.p12 -p AppleP12.com -m prov.mobileprovision -o signed.ipa app.ipa
