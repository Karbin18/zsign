name: AutoSigner
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'ناوی بەرنامە'
        required: true
      ipa_url:
        description: 'لینکی IPA'
        required: true

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup zSign
        run: |
          sudo apt-get update
          sudo apt-get install -y libcommoncrypto-dev cmake
          git clone https://github.com/zhlynn/zsign.git
          cd zsign && mkdir build && cd build && cmake .. && make && sudo cp zsign /usr/local/bin/

      - name: Verify Secret & Files
        run: |
          if [ -z "${{ secrets.P12_PASSWORD }}" ]; then
            echo "❌ کێشە: پاسۆرد لە ناو Secrets نەدۆزرایەوە! دڵنیابەرەوە ناوی سیکرێتەکە P12_PASSWORD بێت."
            exit 1
          fi
          ls -l cert.p12 || (echo "❌ فایلی cert.p12 نەدۆزرایەوە" && exit 1)

      - name: Download IPA
        run: curl -L "${{ github.event.inputs.ipa_url }}" -o app.ipa

      - name: Signing IPA
        run: |
          # هەوڵدان بۆ ساین کردن بە بەکارهێنانی سیکرێت
          zsign -k cert.p12 -p "${{ secrets.P12_PASSWORD }}" -m prov.mobileprovision -o signed.ipa app.ipa || {
            echo "❌ هەڵەی 100: پاسۆردی شەهادەکە هەڵەیە یان فایلەکە کێشەی هەیە."
            exit 1
          }

      - name: Update JSON
        run: |
          IPA_LINK="https://raw.githubusercontent.com/${{ github.repository }}/main/signed.ipa"
          python3 -c "import json, os; 
          f=open('source.json','r+'); 
          d=json.load(f); 
          d['${{ github.event.inputs.app_name }}']='$IPA_LINK'; 
          f.seek(0); 
          json.dump(d,f,indent=2); 
          f.truncate()"
          
      - name: Push Changes
        run: |
          git config --global user.name "SignerBot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Updated ${{ github.event.inputs.app_name }}"
          git push
