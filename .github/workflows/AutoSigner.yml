name: AutoSigner

on:
  workflow_dispatch:
    inputs:
      app_name:
        required: true
      ipa_url:
        required: true

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup zSign
        run: |
          sudo rm -rf zsign
          sudo apt-get update
          sudo apt-get install -y libssl-dev cmake g++ git
          git clone --depth 1 https://github.com/zhlynn/zsign.git
          cd zsign
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)
          sudo cp zsign /usr/local/bin/
          cd ../..

      - name: Download IPA
        run: |
          curl -L "${{ github.event.inputs.ipa_url }}" -o app.ipa

      - name: Sign IPA
        run: |
          # دڵنیابەرەوە پاسۆردەکە ڕێک ئەوەیە کە نووسراوە
          zsign -k cert.p12 -p AppleP12.com -m prov.mobileprovision -o signed.ipa app.ipa

      - name: Save Output and Create Plist
        run: |
          mkdir -p output
          APP_NAME="${{ github.event.inputs.app_name }}"
          REPO="${{ github.repository }}"
          IPA_URL="https://raw.githubusercontent.com/$REPO/main/output/$APP_NAME.ipa"
          
          mv signed.ipa output/$APP_NAME.ipa
          
          # دروستکردنی فایلی پلێ لیست بە شێوەیەکی دروست
          cat <<EOF > output/$APP_NAME.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>items</key>
              <array>
                  <dict>
                      <key>assets</key>
                      <array>
                          <dict>
                              <key>kind</key>
                              <string>software-package</string>
                              <key>url</key>
                              <string>$IPA_URL</string>
                          </dict>
                      </array>
                      <key>metadata</key>
                      <dict>
                          <key>bundle-identifier</key>
                          <string>com.autosigner.app</string>
                          <key>bundle-version</key>
                          <string>1.0</string>
                          <key>kind</key>
                          <string>software</string>
                          <key>title</key>
                          <string>$APP_NAME</string>
                      </dict>
                  </dict>
              </array>
          </dict>
          </plist>
          EOF

      - name: Push Changes
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Add $APP_NAME"
          git push
